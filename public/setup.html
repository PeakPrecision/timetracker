<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Field Crew</title>
  <link rel="stylesheet" href="field.css">
  <style>
    .setup-wrap { max-width: 500px; margin: 0 auto; padding: 24px 16px; }

    .pw-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .pw-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .pw-box h2 {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 6px;
    }
    .pw-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }
    .pw-input {
      width: 100%;
      padding: 16px 18px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .pw-input:focus { outline: none; border-color: var(--green); }

    .setup-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 20px;
      margin-bottom: 16px;
    }

    .setup-card h2 {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .setup-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }
    .setup-item:last-child { border-bottom: none; }
    .setup-item span { font-size: 1rem; font-weight: 700; color: var(--text); }

    .btn-remove {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #EF4444;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-remove:hover { background: rgba(239,68,68,0.2); }

    .add-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .add-input {
      flex: 1;
      padding: 14px 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
    }
    .add-input:focus { outline: none; border-color: var(--green); }
    .add-input::placeholder { color: var(--text-dim); }

    .btn-add {
      padding: 14px 20px;
      background: var(--green);
      color: #0A0A0A;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 22px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.25s ease;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(109,191,58,0.5); color: var(--green); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: #EF4444; }
  </style>
</head>
<body>

  <div class="pw-screen" id="pwScreen">
    <div class="pw-box">
      <h2>Setup</h2>
      <p>Enter your password to manage crew and jobs.</p>
      <input class="pw-input" type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
      <button class="action-btn btn-in" onclick="checkPw()" style="margin-top:0">Enter</button>
    </div>
  </div>

  <div id="setupPage" style="display:none">
    <header class="field-header">
      <div class="brand">
        <img src="logo.svg" alt="Peak Precision" style="height:36px;width:auto;">
        <div class="brand-name">Setup</div>
      </div>
      <nav>
        <a href="index.html">Clock In/Out</a>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <div class="setup-wrap">
      <div class="setup-card">
        <h2>Crew Members</h2>
        <div id="empList"></div>
        <div class="add-row">
          <input class="add-input" type="text" id="newEmp" placeholder="Employee name" onkeydown="if(event.key==='Enter')addEmp()">
          <button class="btn-add" onclick="addEmp()">Add</button>
        </div>
      </div>

      <div class="setup-card">
        <h2>Job Sites</h2>
        <div id="jobList"></div>
        <div class="add-row">
          <input class="add-input" type="text" id="newJob" placeholder="Address or job name" onkeydown="if(event.key==='Enter')addJob()">
          <button class="btn-add" onclick="addJob()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function checkPw() {
      if (document.getElementById('pwInput').value === 'admin') {
        document.getElementById('pwScreen').style.display = 'none';
        document.getElementById('setupPage').style.display = 'block';
        loadAll();
      } else {
        toast('Incorrect password', 'error');
      }
    }

    let toastTimer;
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    async function loadAll() {
      await Promise.all([loadEmps(), loadJobs()]);
    }

    async function loadEmps() {
      try {
        const emps = await fetch('/api/employees').then(r => r.json());
        const list = document.getElementById('empList');
        list.innerHTML = '';
        emps.forEach(e => {
          const row = document.createElement('div');
          row.className = 'setup-item';
          row.innerHTML = `<span>${e.name}</span><button class="btn-remove" onclick="delEmp(${e.id})">Remove</button>`;
          list.appendChild(row);
        });
        if (emps.length === 0) list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">No crew members added yet.</p>';
      } catch (_) {}
    }

    async function loadJobs() {
      try {
        const jobs = await fetch('/api/jobs').then(r => r.json());
        const list = document.getElementById('jobList');
        list.innerHTML = '';
        jobs.forEach(j => {
          const row = document.createElement('div');
          row.className = 'setup-item';
          row.innerHTML = `<span>${j.name}</span><button class="btn-remove" onclick="delJob(${j.id})">Remove</button>`;
          list.appendChild(row);
        });
        if (jobs.length === 0) list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">No jobs added yet.</p>';
      } catch (_) {}
    }

    async function addEmp() {
      const inp = document.getElementById('newEmp');
      const name = inp.value.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/employees', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
        const data = await res.json();
        if (!res.ok) return toast(data.error, 'error');
        inp.value = '';
        toast(`${data.name} added`);
        loadEmps();
      } catch (_) { toast('Server not running', 'error'); }
    }

    async function delEmp(id) {
      try {
        await fetch(`/api/employees/${id}`, { method: 'DELETE' });
        loadEmps();
      } catch (_) {}
    }

    async function addJob() {
      const inp = document.getElementById('newJob');
      const name = inp.value.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/jobs', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
        const data = await res.json();
        if (!res.ok) return toast(data.error, 'error');
        inp.value = '';
        toast(`"${data.name}" added`);
        loadJobs();
      } catch (_) { toast('Server not running', 'error'); }
    }

    async function delJob(id) {
      try {
        await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
        loadJobs();
      } catch (_) {}
    }
  </script>
</body>
</html>
